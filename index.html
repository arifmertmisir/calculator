<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="calculator">
        <div class="calculator-wrapper">
            <div id="display-screen">0</div>
            <button value="c" class="button-clear">C</button>
            <button value="/" class="button-division">÷</button>
            <button value="*" class="button-multiplication">x</button>
            <button value="-" class="button-substraction">-</button>
            <button value=7 class="button-seven">7</button>
            <button value=8 class="button-eight">8</button>
            <button value=9 class="button-nine">9</button>
            <button value="+" class="button-addition">+</button>
            <button value=4 class="button-four">4</button>
            <button value=5 class="button-five">5</button>
            <button value=6 class="button-six">6</button>
            <button value=1 class="button-one">1</button>
            <button value=2 class="button-two">2</button>
            <button value=3 class="button-three">3</button>
            <button value="=" class="button-equals">=</button>
            <button value=0 class="button-zero">0</button>
            <button value="." class="button-comma">,</button>
        </div>
    </div>
    <script src="calculator.js"></script>
</body>
</html>
